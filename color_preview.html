<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIGNAL — Color Preview</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #333; padding: 24px; display: flex; gap: 20px; flex-wrap: wrap; }
.option { width: 320px; }
.option-label { font-family: 'Arial Narrow', Arial; font-size: 12px; font-weight: bold; letter-spacing: 3px; color: #fff; margin-bottom: 10px; background: #1a1a1a; padding: 6px 10px; border-radius: 3px; }

.preview { border-radius: 6px; overflow: hidden; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; gap: 8px; align-items: stretch; }

.stat-box { border-radius: 4px; padding: 8px 10px; width: 80px; flex-shrink: 0; border: 1px solid; }
.stat-lbl  { font-size: 8px; font-weight: bold; letter-spacing: 2px; font-family: 'Arial Narrow', Arial; }
.stat-hp   { font-size: 28px; font-weight: bold; line-height: 1; font-family: 'Arial Narrow', Arial; }
.stat-sub  { font-size: 7px; letter-spacing: 1px; margin-bottom: 3px; }
.stat-fuel { font-size: 9px; font-weight: bold; }

.board-area { display: grid; grid-template-columns: repeat(3,56px); grid-template-rows: repeat(2,56px); gap: 2px; padding: 4px; border-radius: 3px; }
.tile { width: 56px; height: 56px; border-radius: 2px; border: 1px solid; display: flex; flex-direction: column; overflow: hidden; }
.bc-name { font-size: 6.5px; font-weight: bold; font-family: 'Arial Narrow', Arial; padding: 1px 3px; }
.bc-dirs { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; flex: 1; font-size: 9px; font-weight: bold; text-align: center; font-family: 'Arial Narrow', Arial; }
.bc-dirs > div { display: flex; align-items: center; justify-content: center; }
.bc-kw { font-size: 5px; padding: 0 2px; }

.log-box { flex: 1; border-radius: 3px; padding: 6px; font-size: 8px; line-height: 1.7; border: 1px solid; }
.panel-title { font-size: 7px; font-weight: bold; letter-spacing: 2px; font-family: 'Arial Narrow', Arial; margin-bottom: 3px; }

.hand-row { display: flex; gap: 5px; justify-content: center; }
.hand-card { width: 68px; height: 92px; border: 1px solid; border-radius: 3px; display: flex; flex-direction: column; overflow: hidden; }
.hc-hdr  { padding: 2px 3px; font-size: 6px; font-weight: bold; font-family: 'Arial Narrow', Arial; border-bottom: 1px solid rgba(128,128,128,0.2); }
.hc-cost { font-size: 9px; font-weight: bold; padding: 1px 3px; font-family: 'Arial Narrow', Arial; }
.hc-type { font-size: 5px; padding: 0 3px; }
.hc-dirs { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; flex: 1; font-size: 8px; font-weight: bold; text-align: center; font-family: 'Arial Narrow', Arial; }
.hc-dirs > div { display: flex; align-items: center; justify-content: center; }
.hc-eff  { font-size: 5px; padding: 2px 3px; line-height: 1.4; flex: 1; overflow: hidden; }

.panel-box { border-radius: 3px; padding: 7px; font-size: 8px; border: 1px solid; }
.mission-name { font-weight: bold; font-size: 9px; }
.mission-sub  { font-size: 7px; margin-top: 1px; }
.mission-eff  { font-size: 7px; margin-top: 4px; line-height: 1.4; }

.btn-end { font-size: 9px; font-weight: bold; font-family: 'Arial Narrow', Arial; padding: 5px; border-radius: 3px; text-align: center; border: 1px solid; letter-spacing: 1px; }
.turn-info { font-size: 8px; font-family: 'Arial Narrow', Arial; letter-spacing: 1px; text-align: center; }

<!-- reusable board snippet via JS -->
<script>
function board(cls) {
  const units = [
    { cls:'', label:'', dirs:null, kw:'' },
    { cls:'obj', label:'Airfield L2', dirs:null, kw:'' },
    { cls:'p2', label:'Panzer II', dirs:['','5','','2','T','2','','5',''], kw:'' },
    { cls:'p1', label:'Sherman', dirs:['','7','','1','T','6','','4',''], kw:'Armor' },
    { cls:'', label:'', dirs:null, kw:'' },
    { cls:'p1', label:'Rifle Squad', dirs:['','4','','3','I','3','','4',''], kw:'' },
  ];
  return `<div class="board-area">${units.map(u=>`
    <div class="tile ${u.cls}">
      ${u.label ? `<div class="bc-name">${u.label}</div>` : ''}
      ${u.dirs ? `<div class="bc-dirs">${u.dirs.map(v=>`<div>${v}</div>`).join('')}</div>` : ''}
      ${u.kw ? `<div class="bc-kw">${u.kw}</div>` : ''}
    </div>`).join('')}
  </div>`;
}

function hand(cls) {
  return `<div class="hand-row">
    <div class="hand-card sel">
      <div class="hc-hdr">Rifle Squad</div>
      <div class="hc-cost">1</div>
      <div class="hc-type">INFANTRY · COMMON</div>
      <div class="hc-dirs"><div></div><div>4</div><div></div><div>3</div><div style="font-size:4px;opacity:.5">I</div><div>3</div><div></div><div>4</div><div></div></div>
    </div>
    <div class="hand-card">
      <div class="hc-hdr">Field Medic</div>
      <div class="hc-cost">1</div>
      <div class="hc-type">COMMAND · COMMON</div>
      <div class="hc-eff">Remove Suppression from 1 friendly unit.</div>
    </div>
    <div class="hand-card" style="opacity:.4">
      <div class="hc-hdr">Heavy Bomber</div>
      <div class="hc-cost">4</div>
      <div class="hc-type">AIRCRAFT · COMMON</div>
      <div class="hc-dirs"><div></div><div>6</div><div></div><div>6</div><div style="font-size:4px;opacity:.5">A</div><div>6</div><div></div><div>6</div><div></div></div>
    </div>
  </div>`;
}

function preview(id, letter, label) {
  document.getElementById(id).innerHTML = `
    <div class="option-label">${letter} — ${label}</div>
    <div class="preview">
      <div class="row">
        <div class="stat-box">
          <div class="stat-lbl">P 2</div>
          <div class="stat-hp">17</div>
          <div class="stat-sub">HQ HEALTH</div>
          <div class="stat-fuel">3 / 6 Fuel</div>
        </div>
        ${board(id)}
        <div class="log-box">
          <div class="panel-title">BATTLE LOG</div>
          <div class="log-p2">Panzer II placed</div>
          <div class="log-p1">Sherman attacked</div>
          <div class="log-gold">Airfield L2: +1 HQ dmg</div>
          <div class="log-dim">--- Round 4 ---</div>
          <div class="log-p1">Rifle Squad placed</div>
          <div class="log-p2" style="font-size:8px">Suppressed (7 vs 5)</div>
        </div>
      </div>
      <div class="row" style="gap:6px;align-items:center">
        <div class="turn-info" style="flex:1">Round 5 — P1 to play</div>
        <div class="btn-end" style="width:90px">END TURN</div>
      </div>
      <div class="stat-box" style="width:100%">
        <div class="stat-lbl">P 1</div>
        <div class="stat-hp">13</div>
        <div class="stat-sub">HQ HEALTH</div>
        <div class="stat-fuel">4 / 6 Fuel</div>
      </div>
      <div class="panel-title">YOUR HAND</div>
      ${hand(id)}
      <div class="panel-box">
        <div class="panel-title">ACTIVE MISSIONS</div>
        <div class="mission-name">Blitz Assault</div>
        <div class="mission-sub">2 turns remaining</div>
